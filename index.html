<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ogorod Games: Каземат</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d0a06;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; color: #d4c09d; font-family: 'Times New Roman', Times, serif;
            /* Глубокий градиент, имитирующий свет лампы */
            background: radial-gradient(circle at center, rgba(60,40,25,1) 0%, rgba(10,5,0,1) 100%);
        }

        #game-container {
            width: 100vw; height: 100vh;
            max-width: 480px; position: relative;
            display: flex; flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        /* Заголовки */
        .label {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #6b4e31;
            padding: 4px 12px; font-size: 13px;
            letter-spacing: 2px; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .enemy-zone { padding: 25px; display: flex; flex-direction: column; align-items: flex-end; }
        .player-zone { padding: 25px; display: flex; flex-direction: column; align-items: flex-start; margin-top: auto;}

        /* Патроны (HP) */
        .cartridge-box { display: flex; gap: 8px; margin-top: 10px; }

        .bullet {
            width: 18px; height: 45px;
            background: linear-gradient(90deg, #8b6e3f, #d4c09d, #8b6e3f);
            border-radius: 4px 4px 1px 1px; border: 1px solid #4d3d28;
            position: relative; box-shadow: 2px 2px 7px rgba(0,0,0,0.6);
        }

        .bullet::before { /* Пуля */
            content: ''; position: absolute;
            top: -6px; left: 2px;
            width: 12px; height: 14px;
            background: radial-gradient(circle, #777, #333);
            border-radius: 50% 50% 0 0;
        }

        .spent { background: #2a1b0a; border-color: #1a1005; opacity: 0.5; }
        .spent::before { display: none; }

        /* Центр: Револьвер и стол */
        .table-center {
            flex-grow: 1; display: flex;
            justify-content: center; align-items: center;
            position: relative;
        }

        /* Место для анимации */
        .gun-view {
            width: 320px; height: 240px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(107, 78, 49, 0.2);
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.8);
            border-radius: 5px;
        }

        /* --- ЭМУЛЯЦИЯ РЕВОЛЬВЕРА (CSS) --- */
        .revolver-container { position: relative; width: 220px; height: 120px; transform: scale(1.1); }
        
        .revolver-frame {
            position: absolute; bottom: 0; left: 40px;
            width: 140px; height: 80px;
            background: linear-gradient(to bottom, #444, #111);
            border-radius: 20px 20px 10px 10px;
        }
        
        .revolver-barrel {
            position: absolute; top: -10px; left: 20px;
            width: 100px; height: 15px;
            background: linear-gradient(to bottom, #333, #000);
            border-radius: 3px;
        }

        /* Барабан (вращающийся) */
        .revolver-cylinder {
            position: absolute; top: -25px; left: 100px;
            width: 50px; height: 50px;
            background: radial-gradient(circle, #222 0%, #000 70%, #111 100%);
            border-radius: 50%;
            border: 3px solid #6b4e31; /* Кожаная/металлическая рамка */
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(107, 78, 49, 0.5);
        }

        .cylinder-chambers {
            width: 38px; height: 38px;
            background: transparent;
            border-radius: 50%;
            border: 2px dashed rgba(212, 192, 157, 0.2); /* Пустые каморы */
            transition: transform 3s cubic-bezier(0.19, 1, 0.22, 1); /* Плавное затухание вращения */
        }
        
        /* Класс для запуска вращения через JS */
        .spin { transform: rotate(1440deg); }

        /* Панель предметов */
        .inventory {
            display: flex; justify-content: center; gap: 20px;
            padding: 15px; background: rgba(0,0,0,0.3);
            margin-bottom: 2px;
        }

        .item {
            font-size: 30px;
            filter: grayscale(0.6) drop-shadow(2px 2px 3px #000);
            cursor: pointer; transition: transform 0.1s, filter 0.2s;
        }
        .item:active { transform: scale(1.2); filter: grayscale(0); }

        /* Кнопки управления */
        .actions {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 2px; background: #2a1b0a; padding: 2px;
        }

        .btn {
            background: #1a0f05; border: none;
            color: #d4c09d; padding: 25px;
            font-size: 15px; text-transform: uppercase;
            letter-spacing: 2px; font-weight: bold; cursor: pointer;
            transition: background 0.2s;
        }

        .btn:active { background: #3c2a16; }
    </style>
</head>
<body>

<div id="game-container">
    
    <div class="enemy-zone">
        <div class="label">Гроссмейстер</div>
        <div class="cartridge-box">
            <div class="bullet spent"></div>
            <div class="bullet spent"></div>
            <div class="bullet spent"></div>
            <div class="bullet spent"></div>
            <div class="bullet spent"></div>
        </div>
    </div>

    <div class="table-center">
        <div class="gun-view">
            <div class="revolver-container">
                <div class="revolver-frame">
                    <div class="revolver-barrel"></div>
                    <div class="revolver-cylinder">
                        <div id="cylinder-chambers" class="cylinder-chambers">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="player-zone">
        <div class="cartridge-box">
            <div class="bullet"></div>
            <div class="bullet"></div>
            <div class="bullet"></div>
            <div class="bullet"></div>
            <div class="bullet"></div>
        </div>
        <div class="label" style="margin-top:10px;">Твоё здоровье</div>
    </div>

    <div class="inventory">
        <div class="item">🔍</div>
        <div class="item">🔪</div>
        <div class="item">🍺</div>
        <div class="item">💥</div>
    </div>

    <div class="actions">
        <button class="btn" onclick="shootSelf()">В себя</button>
        <button class="btn" onclick="shootEnemy()">В врага</button>
    </div>

</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function spinCylinder() {
        const cylinder = document.getElementById('cylinder-chambers');
        // Убираем класс, если он был, и через мгновение добавляем снова, чтобы запустить анимацию
        cylinder.classList.remove('spin');
        void cylinder.offsetWidth; // Магия для перезапуска CSS-анимации
        cylinder.classList.add('spin');
        
        // Haptic Feedback: серия легких вибраций, имитирующих щелчки
        if (tg.HapticFeedback) {
            tg.HapticFeedback.notificationOccurred('warning');
            setTimeout(() => tg.HapticFeedback.impactOccurred('medium'), 500);
            setTimeout(() => tg.HapticFeedback.impactOccurred('light'), 1000);
            setTimeout(() => tg.HapticFeedback.impactOccurred('light'), 1500);
        }
    }

    function shootSelf() {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
        console.log("Выстрел в себя");
        spinCylinder(); // Запускаем вращение
    }

    function shootEnemy() {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
        console.log("Выстрел в врага");
        spinCylinder(); // Запускаем вращение
    }
</script>

</body>
</html>
